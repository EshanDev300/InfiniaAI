<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinia AI | Next-Gen Intelligence Platform</title>
    <meta name="description" content="Infinia AI — the next-generation intelligence platform. Sign in to access your personalized AI workspace.">
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="stylesheet" href="style.css">
<style>
    /* === SMOOTH ANIMATIONS === */
    @keyframes pageSlideIn {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes navSlideDown {
        from { opacity: 0; transform: translateY(-30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes logoFloat {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-5px) rotate(2deg); }
    }
    @keyframes glowPulse {
        0%, 100% { box-shadow: 0 0 20px rgba(0,255,255,0.2), 0 20px 40px rgba(0,0,0,0.4); }
        50% { box-shadow: 0 0 40px rgba(0,255,255,0.5), 0 25px 50px rgba(0,80,255,0.2); }
    }
    @keyframes btnShimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
    }
    @keyframes inputGlow {
        from { box-shadow: 0 0 0px rgba(0,255,255,0); }
        to { box-shadow: 0 0 18px rgba(0,255,255,0.5); }
    }
    @keyframes iconSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    @keyframes checkmarkPop {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.2); }
        100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeFloat {
        0%, 100% { opacity: 0.6; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-8px); }
    }

    /* Animated page entry */
    .navbar {
        animation: navSlideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .app-wrapper {
        animation: pageSlideIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .glass-card {
        animation: pageSlideIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both,
                   glowPulse 5s ease-in-out infinite;
        position: relative;
        overflow: hidden;
    }
    .logo-icon {
        animation: logoFloat 3s ease-in-out infinite;
    }

    /* Card inner glow overlay on hover */
    .glass-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 2rem;
        background: linear-gradient(135deg, rgba(0,255,255,0.04), rgba(160,0,255,0.04));
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
    }
    .glass-card:hover::before { opacity: 1; }

    /* Input wrappers with label animation */
    .input-wrap {
        position: relative;
        margin-bottom: 1.3rem;
    }
    .input-wrap label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 500;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        color: #b5d0ff;
        transition: color 0.3s ease;
    }
    .input-wrap:focus-within label {
        color: #0ff;
    }
    .input-wrap .input-field {
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
    }
    .input-wrap .input-field:focus {
        transform: translateY(-1px);
    }

    /* Input icon support */
    .input-icon-wrapper {
        position: relative;
    }
    .input-icon-wrapper .fa-icon-left {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(0, 255, 255, 0.45);
        font-size: 0.9rem;
        transition: color 0.3s;
        pointer-events: none;
    }
    .input-icon-wrapper:focus-within .fa-icon-left {
        color: #0ff;
    }
    .input-icon-wrapper .input-field {
        padding-left: 2.8rem;
    }

    /* Eye toggle */
    .toggle-eye {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(0, 255, 255, 0.4);
        cursor: pointer;
        font-size: 0.85rem;
        transition: color 0.2s;
    }
    .toggle-eye:hover { color: #0ff; }

    /* Enhanced btn-glow */
    .btn-glow {
        width: 100%;
        background: linear-gradient(90deg, #0066ff, #9f00ff, #0066ff);
        background-size: 200% auto;
        border: none;
        padding: 1rem;
        border-radius: 2rem;
        font-weight: 700;
        font-size: 1rem;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 0 12px rgba(0,102,255,0.5);
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
    }
    .btn-glow:hover {
        animation: btnShimmer 1.5s linear infinite;
        box-shadow: 0 0 25px rgba(0,255,255,0.7);
        transform: translateY(-2px);
    }
    .btn-glow:active { transform: scale(0.98); }
    .btn-glow .btn-spinner {
        display: none;
        width: 18px; height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: iconSpin 0.7s linear infinite;
    }
    .btn-glow.loading .btn-text { display: none; }
    .btn-glow.loading .btn-spinner { display: block; }

    /* Checkbox row enhanced */
    .checkbox-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
    }
    .checkbox-row label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }
    /* Animated custom checkbox */
    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #0ff;
        cursor: pointer;
        transition: all 0.3s;
    }

    /* Social login enhanced */
    .social-icon {
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }
    .social-icon:hover {
        transform: translateY(-8px) scale(1.1) !important;
    }

    /* Nav item hover enhanced */
    .nav-item {
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    /* Or divider */
    .or-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 1.2rem 0;
        font-size: 0.8rem;
        color: rgba(150, 170, 200, 0.7);
    }
    .or-divider::before,
    .or-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(0, 255, 255, 0.15);
    }

    /* Features strip */
    .features-strip {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 1.2rem;
        flex-wrap: wrap;
    }
    .feature-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.7rem;
        color: rgba(180, 210, 255, 0.7);
        background: rgba(0, 255, 255, 0.06);
        border: 1px solid rgba(0, 255, 255, 0.18);
        border-radius: 20px;
        padding: 4px 12px;
        transition: all 0.3s ease;
        animation: fadeFloat 4s ease-in-out infinite;
    }
    .feature-chip:nth-child(2) { animation-delay: 0.5s; }
    .feature-chip:nth-child(3) { animation-delay: 1s; }
    .feature-chip:nth-child(4) { animation-delay: 1.5s; }
    .feature-chip:hover {
        background: rgba(0,255,255,0.15);
        color: #0ff;
        border-color: #0ff;
        transform: translateY(-3px);
    }
    .feature-chip i { font-size: 0.65rem; color: #0ff; }

    /* Login logo badge */
    .login-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(0,255,255,0.08);
        border: 1px solid rgba(0,255,255,0.25);
        border-radius: 40px;
        padding: 6px 16px;
        font-size: 0.75rem;
        color: rgba(180, 220, 255, 0.9);
        margin-bottom: 1.2rem;
        animation: fadeFloat 3.5s ease-in-out infinite;
    }
    .login-badge i { color: #0ff; }

    /* Toast override for errors */
    .toast-msg.error {
        border-left-color: #ff4466 !important;
        box-shadow: 0 0 15px rgba(255, 68, 102, 0.8) !important;
    }
</style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="app-wrapper">
        <nav class="navbar">
            <div class="logo-area">
                <i class="fas fa-brain logo-icon"></i>
                <span class="logo-text">INFINIA AI</span>
            </div>
            <div class="nav-links">
                <button class="nav-item" id="aiPageBtn"><i class="fas fa-microchip"></i> AI Page</button>
                <div class="dropdown" id="accessDropdown">
                    <button class="nav-item" id="dropdownTrigger"><i class="fas fa-key"></i> Access ▼</button>
                    <div class="dropdown-menu">
                        <a href="#" id="gotoLogin">🔐 Login</a>
                        <a href="signup.html" id="gotoSignup">✨ Sign Up</a>
                    </div>
                </div>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </nav>

        <div class="auth-container">
            <!-- LOGIN CARD -->
            <div class="glass-card" id="login-card">
                <div style="text-align:center; margin-bottom: 1rem;">
                    <div class="login-badge">
                        <i class="fas fa-shield-check"></i>
                        Secure · Private · Encrypted
                    </div>
                </div>
                <div class="card-header">
                    <h2><i class="fas fa-sign-in-alt" style="font-size:1.5rem; background: linear-gradient(135deg,#0ff,#a0f); -webkit-background-clip:text; background-clip:text; color:transparent;"></i> Sign In</h2>
                    <p style="font-size: 0.85rem; opacity:0.8; margin-top: 4px;">Welcome back to the intelligence nexus</p>
                </div>
                <form id="loginForm" novalidate>
                    <div class="input-wrap">
                        <label>Email Address</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-envelope fa-icon-left"></i>
                            <input type="email" class="input-field" id="loginEmail" placeholder="hello@infinia.ai" required autocomplete="email">
                        </div>
                    </div>
                    <div class="input-wrap">
                        <label>Password</label>
                        <div class="input-icon-wrapper" style="position:relative;">
                            <i class="fas fa-lock fa-icon-left"></i>
                            <input type="password" class="input-field" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                            <i class="fas fa-eye toggle-eye" id="toggleLoginPwd"></i>
                        </div>
                    </div>
                    <div class="checkbox-row">
                        <label><input type="checkbox" id="rememberCheck"> Remember me</label>
                        <a href="#" class="forgot-link" id="forgotPwd">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-glow" id="loginBtn">
                        <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i> Login to Infinia</span>
                        <span class="btn-spinner"></span>
                    </button>
                </form>
                <div class="or-divider">or continue with</div>
                <div class="social-login">
                    <div class="social-icon" data-platform="Google" title="Continue with Google"><i class="fab fa-google"></i></div>
                    <div class="social-icon" data-platform="Apple" title="Continue with Apple"><i class="fab fa-apple"></i></div>
                    <div class="social-icon" data-platform="GitHub" title="Continue with GitHub"><i class="fab fa-github"></i></div>
                </div>
                <hr>
                <div style="text-align:center; font-size:0.8rem;">New to Infinia? <a href="signup.html" id="switchToSignup" class="forgot-link">Create account →</a></div>

                <!-- Feature chips -->
                <div class="features-strip">
                    <div class="feature-chip"><i class="fas fa-bolt"></i> Instant Access</div>
                    <div class="feature-chip"><i class="fas fa-robot"></i> AI Powered</div>
                    <div class="feature-chip"><i class="fas fa-gem"></i> Ultra Tier</div>
                    <div class="feature-chip"><i class="fas fa-lock"></i> Secure</div>
                </div>
            </div>
        </div>
    </div>

<script>
// ---- 3D BACKGROUND ----
(function() {
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020610);
    scene.fog = new THREE.FogExp2(0x020610, 0.003);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x222222);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0x2266ff, 1, 30);
    pointLight.position.set(2, 3, 4);
    scene.add(pointLight);
    const purpleLight = new THREE.PointLight(0xaa44ff, 0.7);
    purpleLight.position.set(-2, 1, 5);
    scene.add(purpleLight);

    const knotGeo = new THREE.TorusKnotGeometry(1.2, 0.3, 180, 24, 3, 4);
    const knotMat = new THREE.MeshStandardMaterial({ color: 0x00ccff, emissive: 0x004466, roughness: 0.3, metalness: 0.8 });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    scene.add(knot);

    const shapesGroup = [];
    const colors = [0xff44cc, 0x44ffcc, 0xffaa44];
    for (let i = 0; i < 35; i++) {
        const geo = new THREE.IcosahedronGeometry(0.18, 0);
        const mat = new THREE.MeshStandardMaterial({ color: colors[i % colors.length], emissive: 0x331133, roughness: 0.2 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 8 - 4);
        mesh.userData = { speedX: (Math.random() - 0.5) * 0.008, speedY: (Math.random() - 0.5) * 0.008, rotSpeed: 0.01 };
        scene.add(mesh);
        shapesGroup.push(mesh);
    }

    const particleCount = 1800;
    const particlesGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        positions[i*3] = (Math.random() - 0.5) * 30;
        positions[i*3+1] = (Math.random() - 0.5) * 18;
        positions[i*3+2] = (Math.random() - 0.5) * 20 - 8;
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x33aaff, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
    const particleSystem = new THREE.Points(particlesGeometry, particleMat);
    scene.add(particleSystem);

    const ringGeo = new THREE.TorusGeometry(1.8, 0.05, 64, 300);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x0066aa });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // Robots
    function createRobot(x, z, colorPrimary, colorSecondary) {
        const group = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.9, 1.2, 0.7);
        const bodyMat = new THREE.MeshStandardMaterial({ color: colorPrimary, metalness: 0.7, roughness: 0.3, emissive: 0x111122 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0;
        group.add(body);
        const headGeo = new THREE.SphereGeometry(0.55, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.6, roughness: 0.2 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.95;
        group.add(head);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff, emissiveIntensity: 0.8 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), eyeMat);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), eyeMat);
        leftEye.position.set(-0.2, 1.1, 0.55);
        rightEye.position.set(0.2, 1.1, 0.55);
        group.add(leftEye);
        group.add(rightEye);
        const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.2), new THREE.MeshStandardMaterial({ color: colorSecondary, metalness: 0.5 }));
        jaw.position.set(0, 0.85, 0.55);
        group.add(jaw);
        const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, 0.35, 8), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.5 }));
        antenna.position.set(0, 1.45, 0);
        group.add(antenna);
        group.userData = { jaw: jaw };
        group.position.set(x, -0.8, z);
        return group;
    }
    const robotLeft = createRobot(-3.2, -1.8, 0x3a86ff, 0x9c27b0);
    const robotRight = createRobot(3.2, -1.8, 0xff006e, 0x00b4d8);
    robotLeft.rotation.y = 0.5;
    robotRight.rotation.y = -0.5;
    scene.add(robotLeft);
    scene.add(robotRight);

    const gridHelper = new THREE.GridHelper(22, 40, 0x00ccff, 0x3366aa);
    gridHelper.position.y = -2.5;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.3;
    scene.add(gridHelper);

    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;
        const talkAmplitude = 0.06;
        const leftJaw = robotLeft.userData.jaw;
        const rightJaw = robotRight.userData.jaw;
        if (leftJaw) leftJaw.position.y = 0.85 + Math.sin(time * 5.2) * talkAmplitude;
        if (rightJaw) rightJaw.position.y = 0.85 + Math.sin(time * 4.8 + 1.2) * talkAmplitude;
        knot.rotation.x += 0.008;
        knot.rotation.y += 0.012;
        knot.rotation.z += 0.007;
        ring.rotation.z += 0.005;
        shapesGroup.forEach(obj => {
            obj.position.x += obj.userData.speedX;
            obj.position.y += obj.userData.speedY;
            if (Math.abs(obj.position.x) > 9) obj.userData.speedX *= -1;
            if (Math.abs(obj.position.y) > 6) obj.userData.speedY *= -1;
            obj.rotation.x += obj.userData.rotSpeed;
            obj.rotation.y += obj.userData.rotSpeed;
        });
        particleSystem.rotation.y += 0.0005;
        camera.position.x += (0 - camera.position.x) * 0.02;
        camera.lookAt(0, 0.2, 0);
        renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();

// ---- TOAST ----
function showToast(message, isError = false) {
    const existing = document.querySelector('.toast-msg');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-msg' + (isError ? ' error' : '');
    toast.style.borderLeftColor = isError ? '#ff4466' : '#0ff';
    toast.style.boxShadow = isError ? '0 0 15px rgba(255,68,102,0.8)' : '0 0 15px cyan';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="margin-right:10px;"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'opacity 0.4s, transform 0.4s';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        setTimeout(() => toast.remove(), 400);
    }, 3100);
}

// ---- THEME SYNC ----
(function() {
    const themeToggle = document.getElementById('themeToggle');
    const icon = themeToggle.querySelector('i');
    let isLight = localStorage.getItem('theme') === 'light';
    function applyTheme(light) {
        if (light) {
            document.body.classList.add('light');
            icon.className = "fas fa-sun";
        } else {
            document.body.classList.remove('light');
            icon.className = "fas fa-moon";
        }
    }
    applyTheme(isLight);
    themeToggle.addEventListener('click', () => {
        isLight = !isLight;
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        applyTheme(isLight);
        showToast(isLight ? "☀️ Light mode activated" : "🌙 Dark mode restored", false);
    });
})();

// ---- DROPDOWN ----
(function() {
    const dropdown = document.getElementById('accessDropdown');
    const trigger = document.getElementById('dropdownTrigger');
    trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target)) dropdown.classList.remove('active');
    });

    // Login link in dropdown just scrolls to card
    document.getElementById('gotoLogin').addEventListener('click', (e) => {
        e.preventDefault();
        const card = document.getElementById('login-card');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.transform = 'scale(1.02)';
        setTimeout(() => { card.style.transform = ''; }, 600);
        dropdown.classList.remove('active');
    });
})();

// ---- EYE TOGGLE ----
document.getElementById('toggleLoginPwd').addEventListener('click', function() {
    const field = document.getElementById('loginPassword');
    const isText = field.type === 'text';
    field.type = isText ? 'password' : 'text';
    this.classList.toggle('fa-eye', isText);
    this.classList.toggle('fa-eye-slash', !isText);
});

// ── API base (works for both http://localhost:3000 and file:// by auto-detecting) ──
const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

// ---- LOGIN FORM (MySQL backend) ----
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pwd   = document.getElementById('loginPassword').value;
    const btn   = document.getElementById('loginBtn');
    const pwdField = document.getElementById('loginPassword');

    if (!email || !pwd) {
        showToast('Please fill in both email and password.', true);
        return;
    }
    if (!email.includes('@')) {
        showToast('Enter a valid email address.', true);
        return;
    }

    btn.classList.add('loading');

    try {
        const res  = await fetch(`${API_BASE}/api/login`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pwd })
        });
        const data = await res.json();

        if (data.ok) {
            showToast(`✨ Welcome back, ${data.user.full_name}! Entering workspace...`);
            setTimeout(() => {
                btn.classList.remove('loading');
                window.location.href = 'ai.html';
            }, 1000);
        } else {
            btn.classList.remove('loading');
            showToast(data.message || 'Login failed. Please try again.', true);
            // Shake password field on wrong password
            if (data.message && data.message.toLowerCase().includes('password')) {
                pwdField.style.borderColor  = '#ff4466';
                pwdField.style.boxShadow    = '0 0 12px rgba(255,68,102,0.5)';
                pwdField.style.animation    = 'shake 0.4s ease';
                setTimeout(() => {
                    pwdField.style.borderColor = '';
                    pwdField.style.boxShadow   = '';
                    pwdField.style.animation   = '';
                }, 2000);
            }
        }
    } catch (err) {
        btn.classList.remove('loading');
        showToast('Cannot connect to server. Make sure the server is running on port 3000.', true);
        console.error('[LOGIN FETCH ERROR]', err);
    }
});

// ---- SOCIAL LOGIN (mock social → backend register + login) ----
document.querySelectorAll('.social-icon').forEach(icon => {
    icon.addEventListener('click', async () => {
        const platform  = icon.dataset.platform || 'Social';
        const mockEmail = `${platform.toLowerCase()}_user@${platform.toLowerCase()}.com`;
        const mockName  = `${platform} User`;
        const mockPass  = `${platform}Pass2026!`;

        showToast(`🔐 Signing in via ${platform}...`);

        try {
            // Try to register first (will fail gracefully if already exists)
            await fetch(`${API_BASE}/api/register`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: mockName, username: platform.toLowerCase() + '_user', email: mockEmail, password: mockPass })
            });

            // Then login
            const loginRes  = await fetch(`${API_BASE}/api/login`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: mockEmail, password: mockPass })
            });
            const loginData = await loginRes.json();

            if (loginData.ok) {
                setTimeout(() => { window.location.href = 'ai.html'; }, 900);
            } else {
                showToast('Social login failed. Please try email login.', true);
            }
        } catch (err) {
            showToast('Cannot connect to server. Make sure the server is running.', true);
            console.error('[SOCIAL LOGIN ERROR]', err);
        }
    });
});

// ---- FORGOT PASSWORD ----
document.getElementById('forgotPwd').addEventListener('click', (e) => {
    e.preventDefault();
    const emailInput = document.getElementById('loginEmail').value.trim();
    if (emailInput && emailInput.includes('@')) {
        showToast(`📧 Password reset link sent to ${emailInput}`);
    } else {
        showToast('Enter your email first, then click forgot password.', true);
        document.getElementById('loginEmail').focus();
    }
});

// ---- AI PAGE BTN (check real session via /api/me) ----
document.getElementById('aiPageBtn').addEventListener('click', async () => {
    const btn = document.getElementById('aiPageBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
    try {
        const res  = await fetch(`${API_BASE}/api/me`, { credentials: 'include' });
        const data = await res.json();
        if (data.ok) {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            setTimeout(() => { window.location.href = 'ai.html'; }, 600);
        } else {
            btn.innerHTML = '<i class="fas fa-microchip"></i> AI Page';
            showToast('Please log in to access the Infinia AI workspace.', true);
            const card = document.getElementById('login-card');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('loginEmail').focus();
        }
    } catch {
        btn.innerHTML = '<i class="fas fa-microchip"></i> AI Page';
        showToast('Server not reachable. Start the server first.', true);
    }
});

// ---- URL PARAMETER HANDLING ----
(function() {
    const urlParams  = new URLSearchParams(window.location.search);
    const toastParam = urlParams.get('toast');
    const emailParam = urlParams.get('email');

    if (toastParam === 'please_login') {
        setTimeout(() => showToast('Please sign in to access the AI workspace.', true), 400);
    } else if (toastParam === 'logout_success') {
        setTimeout(() => showToast('👋 Logged out successfully. See you soon!'), 400);
    } else if (toastParam === 'account_created') {
        setTimeout(() => {
            showToast('🎉 Account created! You can now sign in below.');
            if (emailParam) {
                document.getElementById('loginEmail').value = decodeURIComponent(emailParam);
                document.getElementById('loginPassword').focus();
            }
        }, 400);
    }
})();

// Add shake keyframe dynamically
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }`;
document.head.appendChild(shakeStyle);
</script>
</body>
